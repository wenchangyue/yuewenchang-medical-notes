<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}｜{{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines | escape }}">
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="sitemap" type="application/xml" href="{{ '/sitemap.xml' | absolute_url }}">
  <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines | escape }}">
  <meta property="og:type" content="{% if page.video_id %}video.other{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ page.image | default: '/assets/avatar.jpg' | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    :root { --ink:#15313b; --muted:#5b7179; --line:#d7e4e6; --teal:#087f8c;
      --teal-dark:#075f69; --blue:#275dad; --soft:#eef8f8; --warm:#fff9ed;
      --danger:#9b3f4a; --white:#fff; --bg:#f7fbfb; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:var(--bg);
      background-image:radial-gradient(circle at 80% -10%,#d7f1ef 0,transparent 34%);
      font:17px/1.75 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",
      "Hiragino Sans GB","Microsoft YaHei",sans-serif; -webkit-text-size-adjust:100%; }
    .wrap { max-width:960px; margin:0 auto; padding:1.2rem 1.2rem 4rem; }
    header { display:flex; align-items:center; justify-content:space-between; gap:1rem;
      border-bottom:1px solid var(--line); padding-bottom:1rem; margin-bottom:2.4rem; }
    .brand { color:var(--ink); font-weight:800; text-decoration:none; display:flex;
      align-items:center; gap:.75rem; }
    .brand img { width:48px; height:48px; border-radius:50%; border:2px solid var(--white);
      box-shadow:0 2px 12px #4870792c; }
    nav { display:flex; flex-wrap:wrap; gap:.9rem; font-size:.9rem; }
    nav a { color:var(--muted); text-decoration:none; }
    h1 { font-size:clamp(2rem,6vw,3.65rem); line-height:1.14; margin:.3rem 0 1rem; letter-spacing:-.02em; }
    h2 { font-size:1.42rem; margin:2.25rem 0 .7rem; }
    h3 { font-size:1.08rem; margin:1.5rem 0 .45rem; }
    a { color:var(--teal-dark); }
    strong { color:#0f2c35; }
    .lede { color:var(--muted); font-size:1.08rem; max-width:790px; }
    .primary-link { display:inline-block; background:var(--teal); color:var(--white);
      padding:.7rem 1rem; border-radius:999px; font-weight:800; text-decoration:none; }
    .quick-answer { border:1px solid var(--line); border-left:4px solid var(--teal);
      background:var(--white); border-radius:10px; padding:1rem 1.15rem; margin:1.4rem 0; }
    .quick-answer h2 { margin:.1rem 0 .55rem; font-size:1.02rem; color:var(--teal-dark); }
    .meta,.eyebrow { color:var(--muted); font-size:.88rem; }
    .video-list { display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:1rem; }
    .video-card { border:1px solid var(--line); border-radius:12px; background:var(--white);
      padding:1rem 1.08rem; box-shadow:0 6px 24px #31565d0c; }
    .video-card h2 { margin:.15rem 0 .45rem; font-size:1.12rem; }
    .video-card p { margin:.45rem 0; }
    .watch { display:inline-block; font-weight:700; margin:.2rem 0 1.1rem; }
    .video { position:relative; padding-bottom:56.25%; height:0; overflow:hidden;
      border:1px solid var(--line); border-radius:12px; margin:1rem 0 1.5rem; background:#10242c; }
    .video iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
    .note { border-left:3px solid #d09a31; background:var(--warm); padding:.6rem 1rem; color:#5c522f; }
    .risk { border-left-color:var(--danger); color:#69363d; background:#fff4f5; }
    table { width:100%; border-collapse:collapse; margin:1rem 0; background:var(--white); font-size:.92rem; }
    th,td { border:1px solid var(--line); padding:.65rem; text-align:left; vertical-align:top; }
    th { background:var(--soft); }
    blockquote { margin:1.2rem 0; padding:.25rem 1rem; border-left:3px solid var(--teal); color:var(--muted); }
    footer { border-top:1px solid var(--line); margin-top:3rem; padding-top:1rem; color:var(--muted); font-size:.86rem; }
    code { background:#e7f1f1; padding:.1em .35em; border-radius:4px; }
    img { max-width:100%; height:auto; }
    @media (max-width:680px) { body{font-size:16px}.wrap{padding-inline:1rem}header{align-items:flex-start;flex-direction:column}table{display:block;overflow-x:auto} }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand" href="{{ '/' | relative_url }}"><img src="{{ '/assets/avatar.jpg' | relative_url }}" alt="岳文昌医生频道头像">{{ site.title }}</a>
      <nav aria-label="主要导航">
        <a href="{{ '/prostate-cancer/' | relative_url }}">前列腺癌</a>
        <a href="{{ '/evidence-policy/' | relative_url }}">证据与更新</a>
        <a href="{{ '/about/' | relative_url }}">作者与声明</a>
        <a href="{{ site.youtube_channel }}">YouTube</a>
      </nav>
    </header>
    <main>{{ content }}</main>
    <footer>
      <p>本站用于医学科普和教育，不提供个体化诊断或治疗方案。医学信息会更新，具体检查、用药和治疗请咨询了解你完整病情的医生。</p>
      <p><a href="{{ '/llms.txt' | relative_url }}">llms.txt</a> · <a href="{{ '/sitemap.xml' | relative_url }}">sitemap.xml</a> · <a href="{{ site.repository_url }}">GitHub 源码</a></p>
    </footer>
  </div>
  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@graph":[
      {
        "@type":"WebSite",
        "name":{{ site.title | jsonify }},
        "url":{{ site.url | append: site.baseurl | append: '/' | jsonify }},
        "description":{{ site.description | strip_newlines | jsonify }},
        "inLanguage":"zh-CN",
        "publisher":{"@id":{{ site.url | append: site.baseurl | append: '/#author' | jsonify }}}
      },
      {
        "@type":"Person",
        "@id":{{ site.url | append: site.baseurl | append: '/#author' | jsonify }},
        "name":"岳文昌医生",
        "description":"泌尿外科医生、临床医学博士，制作中文医学科普内容。",
        "sameAs":[{{ site.youtube_channel | jsonify }},{{ site.repository_url | jsonify }}]
      }
    ]
  }
  </script>
</body>
</html>
